	<style>
/*
╔══════════════════════════════════════════════════════════════════╗
║     DESIGN VARIABLES — tweak these to retheme the whole page     ║
╚══════════════════════════════════════════════════════════════════╝
*/
		:root {
			/* Page background */
			--page-bg-dark:			#2e2e2e;
			--page-bg-light:		#585858;
			/* Card */
			--card-bg:				#e9e9e9;
			--card-radius:			20px;
			--card-shadow:			0 0.5rem 1.5rem rgba(0,0,0,0.35);
			--card-max-width:		420px;
			--card-pad:				36px;
			/* Avatar */
			--avatar-size:			256px;
			--avatar-border:		3px solid #ccc;
			/* Banner ribbon */
			--banner-fill:			#fefefe;
			--banner-stroke:		#cccccc;
			--banner-stroke-w:		2px;
			--banner-name-size:		0.9rem;
			--banner-name-weight:	700;
			/* Featured icon buttons */
			--icon-btn-bg:			#d4d4d4;
			--icon-btn-hover:		#b8b8b8;
			--icon-btn-size:		80px;
			--icon-size:			48px;
			/* Link list buttons */
			--link-bg:				#45a4da;
			--link-hover:			#036392;
			--link-text:			#f5f5f5;
			--link-radius:			0.5rem;
			--link-font-size:		1.05rem;
			/* Typography */
			--tagline-color:		#555;
			--copyright-color:		#999;
		}
		/* RESET */
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		/* PAGE */
		body {
			min-height: 100vh;
			/* System font stack: SF Pro › Segoe UI › Roboto › Helvetica › Arial */
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
			"Helvetica Neue", Arial, sans-serif;
			background-image: radial-gradient(var(--page-bg-light), var(--page-bg-dark));
			display: flex;
			justify-content: center;
			align-items: flex-start;
			padding: 2rem 1rem 3rem;
		}
		/* CARD */
		#card {
			background: var(--card-bg);
			max-width: var(--card-max-width);
			width: 100%;
			border-radius: var(--card-radius);
			box-shadow: var(--card-shadow);
			padding: var(--card-pad);
			text-align: center;
		}
		/* Full-bleed on small phones */
		@media (max-width: 480px) {
			body  { padding: 0; align-items: flex-start; }
			#card { border-radius: 0; min-height: 100vh; box-shadow: none; }
		}
		/* PROFILE SECTION */
		#profile {
			display: flex;
			flex-direction: column;
			align-items: center;
			padding-top: 20px;
		}
		/* Avatar */
		#avatar {
			display: block;
			width: var(--avatar-size);
			height: var(--avatar-size);
			border-radius: 50%;
			border: var(--avatar-border);
			background: var(--banner-fill);
			object-fit: cover;
			position: relative;
			z-index: 1;
		}
		/* BANNER RIBBON */
		#banner {
			display: flex;
			align-items: flex-start;
			width: auto;
			margin-top: -25px;
			position: relative;
			z-index: 2;
		}
		/* Wing SVGs */
		.wing {
			width: 96px;
			height: 48px;
			flex-shrink: 0;
			display: block;
			overflow: visible;
			position: relative;
			z-index: 1;
			margin-top: 15px;
		}
		.wing path {
			fill: var(--banner-fill);
			stroke: var(--banner-stroke);
			stroke-width: var(--banner-stroke-w);
			stroke-linejoin: round;
			paint-order: stroke fill;
		}
		#wing-right {
			transform: scaleX(-1);
			margin-left: -42px;
		}
		#wing-left { margin-right: -42px; }
		#banner-name {
			flex: 1 1 auto;
			min-width: 160px;
			height: 48px;
			background: var(--banner-fill);
			outline: var(--banner-stroke-w) solid var(--banner-stroke);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: var(--banner-name-size);
			font-weight: var(--banner-name-weight);
			letter-spacing: 0.1em;
			color: #111;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			padding: 0 10px;
			position: relative;
			z-index: 2;
		}
		/* TAGLINE */
		#tagline {
			margin-top: 28px;
			margin-bottom: 0;
			font-size: 0.9rem;
			color: var(--tagline-color);
			line-height: 1.5;
			padding: 0 8px;
		}
		/* FEATURED ICON ROW */
		#featured {
		display: flex;
		flex-wrap: wrap;
		justify-content: center;
		gap: 36px;
		margin: 40px 0 40px;
		}
		/* Hide the featured section entirely if empty */
		#featured:empty { display: none; }
		.feat {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: var(--icon-btn-size);
			height: var(--icon-btn-size);
			border-radius: 50%;
			background: var(--icon-btn-bg);
			text-decoration: none;
			transition: background .2s ease, transform .15s ease;
		}
		.feat:hover {
			background: var(--icon-btn-hover);
			transform: scale(1.08);
		}
		.feat::before {
			content: "";
			display: block;
			width: var(--icon-size);
			height: var(--icon-size);
			background-size: contain;
			background-repeat: no-repeat;
			background-position: center;
		}
		/* LINK LIST */
		#links {
			list-style: none;
			margin: 16px 0 0;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}
		#links a {
			display: flex;
			align-items: center;
			width: 100%;
			padding: 15px 20px;
			background: var(--link-bg);
			color: var(--link-text);
			text-decoration: none;
			font-size: var(--link-font-size);
			font-weight: 500;
			border-radius: var(--link-radius);
			transition: background .22s cubic-bezier(.08,.59,.29,.99), transform .15s ease;
		}
		#links a:hover {
			background: var(--link-hover);
			transform: scale(1.015);
		}
		/* Icon prefix for each link button */
		#links a::before {
			content: "";
			display: inline-block;
			width: 20px;
			height: 20px;
			flex-shrink: 0;
			margin-right: 12px;
			background-size: contain;
			background-repeat: no-repeat;
			background-position: center;
			filter: invert(1);
		}

		/* COPYRIGHT */
		#copyright {
			margin-top: 28px;
			font-size: 0.75rem;
			color: var(--copyright-color);
			line-height: 1.8;
		}
		#copyright a { color: var(--copyright-color); }
